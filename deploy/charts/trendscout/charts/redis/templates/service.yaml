apiVersion: v1
kind: Service
metadata:
  name: {{ include "trendscout.fullname" . }}-redis
  labels:
    app.kubernetes.io/component: redis
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.port }}
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    app.kubernetes.io/component: redis
