apiVersion: v1
kind: Service
metadata:
  name: {{ include "trendscout.fullname" . }}-ollama
  labels:
    app.kubernetes.io/component: ollama
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.port }}
      targetPort: ollama
      protocol: TCP
      name: ollama
  selector:
    app.kubernetes.io/component: ollama
