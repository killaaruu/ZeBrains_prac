# Ollama subchart values — 6 GB single-node k3s defaults
image: ollama/ollama:latest
port: 11434
# Default pool fits 6 GB VRAM — on >=16 GB switch via LLM_MODEL_POOL
modelPool:
  primary: qwen2.5:7b
  fallback: gemma4:12b-it-qat
service:
  type: ClusterIP
persistence:
  size: 20Gi
gpu:
  enabled: true
  # NVIDIA RTX 3060 — 6 GB VRAM
  nvidiaResource: nvidia.com/gpu
  count: 1
resources:
  requests:
    memory: 8Gi
    cpu: "2"
  limits:
    memory: 16Gi
    cpu: "4"
