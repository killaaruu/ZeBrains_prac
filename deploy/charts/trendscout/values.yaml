# TrendScout umbrella chart — global and per-subchart values.
# Subchart values are nested under the subchart name (Helm convention).

redis:
  image: redis:7-alpine
  port: 6379
  service:
    type: ClusterIP
  resources:
    requests:
      memory: 64Mi
      cpu: 100m
    limits:
      memory: 128Mi
      cpu: 500m

postgres:
  image: postgres:16-alpine
  port: 5432
  database: app_local
  user: app
  password: changeme
  persistence:
    size: 8Gi
  service:
    type: ClusterIP
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: "1"

api:
  replicaCount: 1
  image:
    repository: ghcr.io/your-org/api
    tag: latest
    pullPolicy: Always
  secretName: api-secrets
  env:
    PORT: "3000"
    MIGRATIONS_DIR: /app/migrations
  ingress:
    enabled: false
  migration:
    enabled: true
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: "1"

worker:
  replicaCount: 1
  image:
    repository: ghcr.io/your-org/api
    tag: latest
    pullPolicy: Always
  secretName: api-secrets
  env:
    PORT: "3000"
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: "1"

ollama:
  image: ollama/ollama:latest
  port: 11434
  modelPool:
    primary: qwen2.5:7b
    fallback: gemma4:12b-it-qat
  service:
    type: ClusterIP
  persistence:
    size: 20Gi
  gpu:
    enabled: true
    nvidiaResource: nvidia.com/gpu
    count: 1
  resources:
    requests:
      memory: 8Gi
      cpu: "2"
    limits:
      memory: 16Gi
      cpu: "4"
      nvidia.com/gpu: 1
