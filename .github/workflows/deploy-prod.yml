# Production deploy — web app to Vercel.
#
# Same model as staging (see deploy-staging.yml and docs/deployment.md): the API
# runs on a local GPU host behind a stable ngrok domain, so only the web app is
# shipped here. All VITE_* values come from the Vercel project's Environment
# Variables at build time.
#
# Required GitHub secrets: VERCEL_TOKEN, VERCEL_ORG_ID.
# Required GitHub variable: VERCEL_WEB_PROJECT_ID_PROD (deploy is skipped if empty).
name: Deploy production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  vercel-web:
    name: Vercel — web (production)
    runs-on: ubuntu-latest
    if: ${{ vars.VERCEL_WEB_PROJECT_ID_PROD != '' }}
    timeout-minutes: 10
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_WEB_PROJECT_ID_PROD }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Pull Vercel project
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      # Fail loudly instead of shipping a green build whose bundle has empty
      # VITE_* values (Supabase/API would silently break at runtime).
      - name: Verify required env vars are present
        run: |
          f=.vercel/.env.production.local
          for v in VITE_API_URL VITE_SUPABASE_URL VITE_SUPABASE_PUBLISHABLE_KEY; do
            val=$(grep "^$v=" "$f" 2>/dev/null | cut -d= -f2- | tr -d '"')
            if [ -z "$val" ]; then
              echo "::error::$v is missing or empty in the Vercel project env — set it in Vercel before deploying."
              exit 1
            fi
          done
      - name: Build with Vercel
        run: npx vercel build --prod --token="$VERCEL_TOKEN"
      - name: Deploy prebuilt output
        run: npx vercel deploy --prebuilt --prod --archive=tgz --token="$VERCEL_TOKEN"
