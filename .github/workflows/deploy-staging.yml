# Staging deploy — web app to Vercel.
#
# The API is NOT containerized/clustered for this product: it runs locally on a
# GPU machine (Ollama) and is exposed to the Vercel frontend through a stable
# ngrok domain. So this workflow only ships the web app. The API "deploy" is
# `make demo` on the host machine (see docs/deployment.md).
#
# All VITE_* values (including VITE_API_URL = the ngrok domain) live in the
# Vercel project's Environment Variables and are pulled at build time — there is
# no API URL hardcoded here, so a new build never needs a code change.
#
# Required GitHub secrets: VERCEL_TOKEN, VERCEL_ORG_ID.
# Required GitHub variable: VERCEL_WEB_PROJECT_ID (deploy is skipped if empty).
name: Deploy staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  vercel-web:
    name: Vercel — web (staging)
    runs-on: ubuntu-latest
    if: ${{ vars.VERCEL_WEB_PROJECT_ID != '' }}
    timeout-minutes: 10
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_WEB_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      # Pulls the linked project + its Environment Variables (VITE_*) from Vercel.
      - name: Pull Vercel project
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      # Fail loudly instead of shipping a green build whose bundle has empty
      # VITE_* values (Supabase/API would silently break at runtime).
      - name: Verify required env vars are present
        run: |
          f=.vercel/.env.production.local
          for v in VITE_API_URL VITE_SUPABASE_URL VITE_SUPABASE_PUBLISHABLE_KEY; do
            val=$(grep "^$v=" "$f" 2>/dev/null | cut -d= -f2- | tr -d '"')
            if [ -z "$val" ]; then
              echo "::error::$v is missing or empty in the Vercel project env — set it in Vercel before deploying."
              exit 1
            fi
          done
      - name: Build with Vercel
        run: npx vercel build --prod --token="$VERCEL_TOKEN"
      - name: Deploy prebuilt output
        run: npx vercel deploy --prebuilt --prod --archive=tgz --token="$VERCEL_TOKEN"
